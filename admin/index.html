<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>流量卡智能顾问 - 管理后台</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",Arial,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;padding:20px}
    .container{max-width:1200px;margin:0 auto}
    .header{text-align:center;margin-bottom:40px}
    .header h1{font-size:28px;margin-bottom:8px;color:#fff}
    .header p{color:#94a3b8;font-size:14px}
    
    .tabs{display:flex;gap:12px;margin-bottom:30px;border-bottom:1px solid rgba(255,255,255,0.1);padding-bottom:16px}
    .tab{padding:10px 20px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;cursor:pointer;transition:all 0.2s;color:#94a3b8}
    .tab.active{background:#0d9488;color:#fff;border-color:#0d9488}
    
    .section{display:none}
    .section.active{display:block}
    
    .form-group{margin-bottom:24px;background:rgba(30,37,53,0.6);padding:20px;border-radius:12px;border:1px solid rgba(255,255,255,0.06)}
    .form-group label{display:block;margin-bottom:8px;font-weight:600;color:#e2e8f0;font-size:14px}
    .form-group input, .form-group textarea, .form-group select{width:100%;padding:10px 14px;background:rgba(15,20,30,0.8);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#e2e8f0;font-size:14px;font-family:inherit}
    .form-group input:focus, .form-group textarea:focus{outline:none;border-color:#0d9488;box-shadow:0 0 0 3px rgba(13,148,136,0.1)}
    .form-group textarea{resize:vertical;min-height:100px}
    
    .color-picker{display:flex;gap:12px;align-items:center}
    .color-input{width:60px;height:40px;border:1px solid rgba(255,255,255,0.1);border-radius:8px;cursor:pointer}
    .color-value{flex:1;padding:10px 14px;background:rgba(15,20,30,0.8);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#e2e8f0}
    
    .array-item{background:rgba(15,20,30,0.5);padding:12px;border-radius:8px;margin-bottom:8px;display:flex;gap:8px;align-items:center}
    .array-item input{flex:1}
    .array-item button{padding:6px 12px;background:#dc2626;border:none;border-radius:6px;color:#fff;cursor:pointer;font-size:12px}
    .array-item button:hover{background:#b91c1c}
    
    .btn-group{display:flex;gap:12px;margin-top:30px}
    .btn{padding:12px 24px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s}
    .btn-primary{background:#0d9488;color:#fff}
    .btn-primary:hover{background:#0f766e;transform:translateY(-1px)}
    .btn-secondary{background:rgba(255,255,255,0.1);color:#e2e8f0;border:1px solid rgba(255,255,255,0.2)}
    .btn-secondary:hover{background:rgba(255,255,255,0.15)}
    
    .preview{background:rgba(30,37,53,0.6);padding:20px;border-radius:12px;border:1px solid rgba(255,255,255,0.06);margin-top:20px}
    .preview h3{margin-bottom:12px;color:#5eead4}
    .preview-item{padding:8px 12px;background:rgba(15,20,30,0.5);border-radius:6px;margin-bottom:6px;font-size:13px}
    
    .status{padding:12px 16px;border-radius:8px;margin-bottom:20px;display:none}
    .status.show{display:block}
    .status.success{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);color:#10b981}
    .status.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#ef4444}
    
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
    @media(max-width:768px){.grid-2{grid-template-columns:1fr}}
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>📱 流量卡智能顾问 - 管理后台</h1>
    <p>配置页面样式、文案、功能开关等</p>
  </div>

  <div class="status" id="status"></div>

  <div class="tabs">
    <button class="tab active" data-tab="site">网站信息</button>
    <button class="tab" data-tab="colors">配色方案</button>
    <button class="tab" data-tab="layout">布局设置</button>
    <button class="tab" data-tab="chat">对话框</button>
    <button class="tab" data-tab="features">功能开关</button>
    <button class="tab" data-tab="preview">预览</button>
  </div>

  <!-- 网站信息 -->
  <div class="section active" id="site">
    <div class="form-group">
      <label>网站标题</label>
      <input type="text" id="siteTitle" placeholder="流量卡智能顾问 AI">
    </div>
    <div class="form-group">
      <label>副标题</label>
      <input type="text" id="siteSubtitle" placeholder="3秒匹配 · 无合约 · 不虚量 · 官方可查">
    </div>
    <div class="form-group">
      <label>初始欢迎语</label>
      <textarea id="initMessage"></textarea>
    </div>
    <div class="form-group">
      <label>套餐展示欢迎语</label>
      <textarea id="initProductsMessage"></textarea>
    </div>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="saveConfig()">💾 保存配置</button>
      <button class="btn btn-secondary" onclick="resetConfig()">🔄 重置</button>
    </div>
  </div>

  <!-- 配色方案 -->
  <div class="section" id="colors">
    <div class="grid-2">
      <div class="form-group">
        <label>主色 (Primary)</label>
        <div class="color-picker">
          <input type="color" id="colorPrimary" class="color-input">
          <input type="text" id="colorPrimaryValue" class="color-value" readonly>
        </div>
      </div>
      <div class="form-group">
        <label>主色深 (Primary Dark)</label>
        <div class="color-picker">
          <input type="color" id="colorPrimaryLight" class="color-input">
          <input type="text" id="colorPrimaryLightValue" class="color-value" readonly>
        </div>
      </div>
      <div class="form-group">
        <label>强调色 (Accent)</label>
        <div class="color-picker">
          <input type="color" id="colorAccent" class="color-input">
          <input type="text" id="colorAccentValue" class="color-value" readonly>
        </div>
      </div>
      <div class="form-group">
        <label>背景色</label>
        <div class="color-picker">
          <input type="color" id="colorBackground" class="color-input">
          <input type="text" id="colorBackgroundValue" class="color-value" readonly>
        </div>
      </div>
      <div class="form-group">
        <label>文字主色</label>
        <div class="color-picker">
          <input type="color" id="colorTextPrimary" class="color-input">
          <input type="text" id="colorTextPrimaryValue" class="color-value" readonly>
        </div>
      </div>
      <div class="form-group">
        <label>文字辅色</label>
        <div class="color-picker">
          <input type="color" id="colorTextSecondary" class="color-input">
          <input type="text" id="colorTextSecondaryValue" class="color-value" readonly>
        </div>
      </div>
    </div>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="saveConfig()">💾 保存配置</button>
      <button class="btn btn-secondary" onclick="resetConfig()">🔄 重置</button>
    </div>
  </div>

  <!-- 布局设置 -->
  <div class="section" id="layout">
    <div class="grid-2">
      <div class="form-group">
        <label>最大宽度 (PC)</label>
        <input type="number" id="layoutMaxWidth" placeholder="900">
      </div>
      <div class="form-group">
        <label>最大宽度 (大屏)</label>
        <input type="number" id="layoutMaxWidthDesktop" placeholder="1000">
      </div>
      <div class="form-group">
        <label>圆角大小 (px)</label>
        <input type="number" id="layoutBorderRadius" placeholder="16">
      </div>
      <div class="form-group">
        <label>头像尺寸 (px)</label>
        <input type="number" id="layoutAvatarSize" placeholder="42">
      </div>
      <div class="form-group">
        <label>气泡间距 (px)</label>
        <input type="number" id="layoutBubbleSpacing" placeholder="20">
      </div>
      <div class="form-group">
        <label>卡片间距 (px)</label>
        <input type="number" id="layoutCardSpacing" placeholder="16">
      </div>
    </div>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="saveConfig()">💾 保存配置</button>
      <button class="btn btn-secondary" onclick="resetConfig()">🔄 重置</button>
    </div>
  </div>

  <!-- 对话框设置 -->
  <div class="section" id="chat">
    <div class="form-group">
      <label>AI气泡背景色</label>
      <input type="text" id="chatAiBubbleBg" placeholder="rgba(30,34,42,0.92)">
    </div>
    <div class="form-group">
      <label>用户气泡背景色</label>
      <input type="text" id="chatUserBubbleBg" placeholder="linear-gradient(...)">
    </div>
    <div class="form-group">
      <label>AI气泡圆角 (px)</label>
      <input type="number" id="chatAiBubbleRadius" placeholder="16">
    </div>
    <div class="form-group">
      <label>用户气泡圆角 (px)</label>
      <input type="number" id="chatUserBubbleRadius" placeholder="16">
    </div>
    <div class="form-group">
      <label>气泡最大宽度 (%)</label>
      <input type="number" id="chatMaxBubbleWidth" placeholder="78">
    </div>
    <div class="form-group">
      <label>显示阴影</label>
      <select id="chatShowShadow">
        <option value="true">是</option>
        <option value="false">否</option>
      </select>
    </div>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="saveConfig()">💾 保存配置</button>
      <button class="btn btn-secondary" onclick="resetConfig()">🔄 重置</button>
    </div>
  </div>

  <!-- 功能开关 -->
  <div class="section" id="features">
    <div class="form-group">
      <label>
        <input type="checkbox" id="featureShowHighlights"> 显示亮点标签
      </label>
    </div>
    <div class="form-group">
      <label>
        <input type="checkbox" id="featureShowRegionTag"> 显示地区标签
      </label>
    </div>
    <div class="form-group">
      <label>
        <input type="checkbox" id="featureShowPriceRow"> 显示价格行
      </label>
    </div>
    <div class="form-group">
      <label>
        <input type="checkbox" id="featureAutoScroll"> 自动滚动到底部
      </label>
    </div>
    <div class="form-group">
      <label>
        <input type="checkbox" id="featureKeyboardAdapt"> 键盘自适应
      </label>
    </div>
    <div class="form-group">
      <label>
        <input type="checkbox" id="featureNationFirst"> 全国套餐优先
      </label>
    </div>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="saveConfig()">💾 保存配置</button>
      <button class="btn btn-secondary" onclick="resetConfig()">🔄 重置</button>
    </div>
  </div>

  <!-- 预览 -->
  <div class="section" id="preview">
    <div class="preview">
      <h3>当前配置预览</h3>
      <div id="previewContent"></div>
    </div>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="downloadConfig()">⬇️ 下载配置</button>
      <button class="btn btn-secondary" onclick="copyConfigJson()">📋 复制JSON</button>
    </div>
  </div>
</div>

<script>
let config = {};

// 加载配置
async function loadConfig(){
  try{
    const res = await fetch('./config.json');
    config = await res.json();
    populateForm();
    updatePreview();
  }catch(e){
    showStatus('加载配置失败: '+e.message, 'error');
  }
}

// 填充表单
function populateForm(){
  // 网站信息
  document.getElementById('siteTitle').value = config.site?.title || '';
  document.getElementById('siteSubtitle').value = config.site?.subtitle || '';
  document.getElementById('initMessage').value = config.initMessage || '';
  document.getElementById('initProductsMessage').value = config.initProductsMessage || '';
  
  // 配色
  Object.keys(config.colors || {}).forEach(key => {
    const el = document.getElementById('color'+key.charAt(0).toUpperCase()+key.slice(1));
    const valEl = document.getElementById('color'+key.charAt(0).toUpperCase()+key.slice(1)+'Value');
    if(el && config.colors[key]){
      el.value = config.colors[key];
      if(valEl) valEl.value = config.colors[key];
    }
  });
  
  // 布局
  document.getElementById('layoutMaxWidth').value = config.layout?.maxWidth || 900;
  document.getElementById('layoutMaxWidthDesktop').value = config.layout?.maxWidthDesktop || 1000;
  document.getElementById('layoutBorderRadius').value = config.layout?.borderRadius || 16;
  document.getElementById('layoutAvatarSize').value = config.layout?.avatarSize || 42;
  document.getElementById('layoutBubbleSpacing').value = config.layout?.bubbleSpacing || 20;
  document.getElementById('layoutCardSpacing').value = config.layout?.cardSpacing || 16;
  
  // 对话框
  document.getElementById('chatAiBubbleBg').value = config.chat?.aiBubbleBg || '';
  document.getElementById('chatUserBubbleBg').value = config.chat?.userBubbleBg || '';
  document.getElementById('chatAiBubbleRadius').value = config.chat?.aiBubbleRadius || 16;
  document.getElementById('chatUserBubbleRadius').value = config.chat?.userBubbleRadius || 16;
  document.getElementById('chatMaxBubbleWidth').value = config.chat?.maxBubbleWidth || 78;
  document.getElementById('chatShowShadow').value = config.chat?.showShadow ? 'true' : 'false';
  
  // 功能开关
  document.getElementById('featureShowHighlights').checked = config.features?.showHighlights !== false;
  document.getElementById('featureShowRegionTag').checked = config.features?.showRegionTag !== false;
  document.getElementById('featureShowPriceRow').checked = config.features?.showPriceRow !== false;
  document.getElementById('featureAutoScroll').checked = config.features?.autoScroll !== false;
  document.getElementById('featureKeyboardAdapt').checked = config.features?.keyboardAdapt !== false;
  document.getElementById('featureNationFirst').checked = config.features?.nationFirst !== false;
}

// 保存配置
function saveConfig(){
  config.site = {
    title: document.getElementById('siteTitle').value,
    subtitle: document.getElementById('siteSubtitle').value
  };
  
  config.colors = {
    primary: document.getElementById('colorPrimary').value,
    primaryLight: document.getElementById('colorPrimaryLight').value,
    accent: document.getElementById('colorAccent').value,
    background: document.getElementById('colorBackground').value,
    textPrimary: document.getElementById('colorTextPrimary').value,
    textSecondary: document.getElementById('colorTextSecondary').value
  };
  
  config.layout = {
    maxWidth: parseInt(document.getElementById('layoutMaxWidth').value),
    maxWidthDesktop: parseInt(document.getElementById('layoutMaxWidthDesktop').value),
    borderRadius: parseInt(document.getElementById('layoutBorderRadius').value),
    avatarSize: parseInt(document.getElementById('layoutAvatarSize').value),
    bubbleSpacing: parseInt(document.getElementById('layoutBubbleSpacing').value),
    cardSpacing: parseInt(document.getElementById('layoutCardSpacing').value)
  };
  
  config.chat = {
    aiBubbleBg: document.getElementById('chatAiBubbleBg').value,
    userBubbleBg: document.getElementById('chatUserBubbleBg').value,
    aiBubbleRadius: parseInt(document.getElementById('chatAiBubbleRadius').value),
    userBubbleRadius: parseInt(document.getElementById('chatUserBubbleRadius').value),
    maxBubbleWidth: parseInt(document.getElementById('chatMaxBubbleWidth').value),
    showShadow: document.getElementById('chatShowShadow').value === 'true'
  };
  
  config.features = {
    showHighlights: document.getElementById('featureShowHighlights').checked,
    showRegionTag: document.getElementById('featureShowRegionTag').checked,
    showPriceRow: document.getElementById('featureShowPriceRow').checked,
    autoScroll: document.getElementById('featureAutoScroll').checked,
    keyboardAdapt: document.getElementById('featureKeyboardAdapt').checked,
    nationFirst: document.getElementById('featureNationFirst').checked
  };
  
  config.initMessage = document.getElementById('initMessage').value;
  config.initProductsMessage = document.getElementById('initProductsMessage').value;
  
  updatePreview();
  showStatus('✅ 配置已保存到本地，请复制JSON并提交到Git', 'success');
}

// 重置配置
function resetConfig(){
  if(confirm('确定要重置所有配置吗？')){
    loadConfig();
    showStatus('已重置为默认配置', 'success');
  }
}

// 更新预览
function updatePreview(){
  const preview = document.getElementById('previewContent');
  preview.innerHTML = `
    <div class="preview-item"><strong>标题:</strong> ${config.site?.title}</div>
    <div class="preview-item"><strong>副标题:</strong> ${config.site?.subtitle}</div>
    <div class="preview-item"><strong>主色:</strong> <span style="color:${config.colors?.primary}">${config.colors?.primary}</span></div>
    <div class="preview-item"><strong>最大宽度:</strong> ${config.layout?.maxWidth}px</div>
    <div class="preview-item"><strong>头像尺寸:</strong> ${config.layout?.avatarSize}px</div>
    <div class="preview-item"><strong>气泡间距:</strong> ${config.layout?.bubbleSpacing}px</div>
    <div class="preview-item"><strong>启用功能:</strong> ${Object.entries(config.features || {}).filter(([k,v])=>v).map(([k])=>k).join(', ')}</div>
  `;
}

// 下载配置
function downloadConfig(){
  const json = JSON.stringify(config, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'config.json';
  a.click();
  URL.revokeObjectURL(url);
}

// 复制JSON
function copyConfigJson(){
  const json = JSON.stringify(config, null, 2);
  navigator.clipboard.writeText(json).then(()=>{
    showStatus('✅ 配置JSON已复制到剪贴板', 'success');
  });
}

// 显示状态
function showStatus(msg, type){
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status show '+type;
  setTimeout(()=>el.classList.remove('show'), 3000);
}

// 标签切换
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click', ()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.tab).classList.add('active');
  });
});

// 颜色输入同步
document.querySelectorAll('.color-input').forEach(input=>{
  input.addEventListener('change', (e)=>{
    const valueEl = e.target.nextElementSibling;
    if(valueEl) valueEl.value = e.target.value;
  });
});

// 初始化
loadConfig();
</script>

</body>
</html>
