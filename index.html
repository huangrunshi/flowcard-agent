  {id:"p3819",operator:"移动",name:"0327移动泡泡卡【河北省内】",price:40,flow:160,talk:300,region:"发全国",nation:true,budget:false,desc:"40元160G通用+300分钟",url:"https://vip.777haoka.cn/order/index?uid=V1pnM1FJS3VZZ3c9&pid=3819"},
  {id:"p3822",operator:"联通",name:"0327联通绘梦卡【本地归属】",price:39,flow:20,talk:100,region:"发全国",nation:true,budget:false,desc:"39元20G通用+30G定向+100分钟",url:"https://vip.777haoka.cn/order/index?uid=V1pnM1FJS3VZZ3c9&pid=3822"},
  {id:"p3827",operator:"广电",name:"0329广电花菜卡【本地归属】",price:39,flow:222,talk:15,region:"发全国",nation:true,budget:false,desc:"39元222G通用+0.15分钟（需参加多用多送活动）",url:"https://vip.777haoka.cn/order/index?uid=V1pnM1FJS3VZZ3c9&pid=3827"}
];

var userConditions={budget:null,operator:null,needTalk:null,region:null};
var currentResults=[];
var resultIndex=0;
var isSearching=false;

/* ===== 工具函数 ===== */
function now(){var d=new Date();return d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');}

function scrollToBottom(){
  var main=document.getElementById('main');
  setTimeout(function(){main.scrollTop=main.scrollHeight;},80);
}

function scrollToEl(el){
  setTimeout(function(){el.scrollIntoView({behavior:'smooth',block:'start'});},80);
}

/* ===== 气泡消息 ===== */
function showBotMessage(text){
  var chatArea=document.getElementById('chatArea');
  var div=document.createElement('div');
  div.className='chat-bubble bot';
  div.innerHTML='<div class="chat-avatar">✨</div>'+
    '<div><div class="chat-content">'+text.replace(/\n/g,'<br>')+'</div>'+
    '<div class="chat-time">'+now()+'</div></div>';
  chatArea.appendChild(div);
  scrollToBottom();
}

function showUserMessage(text){
  var chatArea=document.getElementById('chatArea');
  var div=document.createElement('div');
  div.className='chat-bubble user';
  div.innerHTML='<div class="chat-avatar">👤</div>'+
    '<div><div class="chat-content">'+text+'</div>'+
    '<div class="chat-time">'+now()+'</div></div>';
  chatArea.appendChild(div);
  scrollToBottom();
}

/* ===== 加载提示 ===== */
function showLoadingHint(msg){
  var area=document.getElementById('loadingArea');
  area.innerHTML='<div class="loading-hint">'+msg+'<span class="dots"></span></div>';
  scrollToBottom();
}
function hideLoadingHint(){
  document.getElementById('loadingArea').innerHTML='';
}

/* ===== 条件标签栏 ===== */
function updateConditionsBar(){
  var bar=document.getElementById('conditionsBar');
  var tags=[];
  if(userConditions.operator) tags.push({label:'运营商：'+userConditions.operator,key:'operator'});
  if(userConditions.budget) tags.push({label:'低月租',key:'budget'});
  if(userConditions.needTalk===true) tags.push({label:'需要通话',key:'needTalk'});
  if(userConditions.needTalk===false) tags.push({label:'纯流量',key:'needTalk'});
  if(userConditions.region==='nation') tags.push({label:'全国通用',key:'region'});
  bar.innerHTML='';
  if(tags.length>0){
    bar.classList.add('has-tags');
    var label=document.createElement('span');
    label.className='cond-label';
    label.textContent='已选：';
    bar.appendChild(label);
    tags.forEach(function(t){
      var tag=document.createElement('div');
      tag.className='condition-tag';
      tag.innerHTML=t.label+'<span class="rm" data-key="'+t.key+'">✕</span>';
      tag.querySelector('.rm').onclick=function(e){
        e.stopPropagation();
        userConditions[t.key]=null;
        updateConditionsBar();
        doSearch();
      };
      bar.appendChild(tag);
    });
  }else{
    bar.classList.remove('has-tags');
  }
}

/* ===== 亮点标签 ===== */
function getHighlights(p){
  var h=[];
  if(p.flow>=200) h.push('<span class="hl bigflow">💧大流量</span>');
  if(p.nation) h.push('<span class="hl nation">🚀全国通用</span>');
  if(p.budget) h.push('<span class="hl cheap">💸低月租</span>');
  if(p.talk>=300) h.push('<span class="hl talk">📞通话多</span>');
  if(p.flow>=100&&p.price<=29) h.push('<span class="hl value">⭐高性价比</span>');
  return h.join('');
}

/* ===== 展示套餐卡片 ===== */
function showNextResults(){
  hideLoadingHint();
  var chatArea=document.getElementById('chatArea');
  var isFirst=(resultIndex===0);

  if(isFirst){
    chatArea.querySelectorAll('.result-cards,.btn-more,.done-tip').forEach(function(el){el.remove();});
  }else{
    chatArea.querySelectorAll('.btn-more,.done-tip').forEach(function(el){el.remove();});
  }

  var cards=document.createElement('div');
  cards.className='result-cards';
  var batch=currentResults.slice(resultIndex,resultIndex+3);
  batch.forEach(function(p){
    var regionTag=p.nation
      ?'<span class="card-region-tag nation">🌐全国</span>'
      :'<span class="card-region-tag local">📍省内</span>';
    var talkText=p.talk>0?p.talk+'分钟':'纯流量';
    var hl=getHighlights(p);
    cards.innerHTML+=
      '<div class="result-card">'+
        '<div class="card-top">'+
          '<div class="card-name">'+p.name+'</div>'+
          regionTag+
        '</div>'+
        (hl?'<div class="card-highlights">'+hl+'</div>':'')+
        '<div class="card-specs">'+
          '<div class="spec"><div class="spec-val">'+p.operator+'</div><div class="spec-label">运营商</div></div>'+
          '<div class="spec"><div class="spec-val">'+p.flow+'G</div><div class="spec-label">流量</div></div>'+
          '<div class="spec"><div class="spec-val">'+talkText+'</div><div class="spec-label">通话</div></div>'+
          '<div class="spec"><div class="spec-val">'+(p.region.split('发')[1]||'省内')+'</div><div class="spec-label">地区</div></div>'+
        '</div>'+
        '<div class="card-price-row"><span class="price-num">'+p.price+'</span><span class="price-unit">元/月</span></div>'+
        '<div class="card-desc">'+p.desc+'</div>'+
        '<div class="card-actions">'+
          '<button class="btn-order" onclick="window.open(\''+p.url+'\',\'_blank\')">📞 立即办理</button>'+
        '</div>'+
      '</div>';
  });
  chatArea.appendChild(cards);
  resultIndex+=3;
  scrollToEl(cards);

  if(resultIndex<currentResults.length){
    var remaining=currentResults.length-resultIndex;
    var moreBtn=document.createElement('button');
    moreBtn.className='btn-more';
    moreBtn.textContent='🔄 换一批 · 还有'+remaining+'款';
    moreBtn.onclick=function(){
      moreBtn.disabled=true;
      moreBtn.textContent='⏳ 加载中...';
      showLoadingHint('正在为您匹配下一批套餐');
      setTimeout(showNextResults,500);
    };
    chatArea.appendChild(moreBtn);
  }else{
    var done=document.createElement('div');
    done.className='done-tip';
    done.textContent='✅ 已展示全部 '+currentResults.length+' 款套餐';
    chatArea.appendChild(done);
  }
  isSearching=false;
  setQuickBtnsDisabled(false);
}

/* ===== 搜索逻辑 ===== */
function doSearch(){
  var results=PRODUCTS.filter(function(p){return p.price>0&&p.flow>0;});
  if(userConditions.operator) results=results.filter(function(p){return p.operator===userConditions.operator;});
  if(userConditions.budget) results=results.filter(function(p){return p.budget;});
  if(userConditions.needTalk===true) results=results.filter(function(p){return p.talk>0;});
  if(userConditions.needTalk===false) results=results.filter(function(p){return p.talk===0;});
  if(userConditions.region==='nation') results=results.filter(function(p){return p.nation;});
  results.sort(function(a,b){
    if(a.nation&&!b.nation) return -1;
    if(!a.nation&&b.nation) return 1;
    return b.flow-a.flow;
  });
  currentResults=results;
  resultIndex=0;
  if(results.length===0){
    hideLoadingHint();
    showBotMessage('😢 没有找到符合条件的套餐，试试放宽条件？');
    isSearching=false;
    setQuickBtnsDisabled(false);
  }else{
    setTimeout(showNextResults,500);
  }
}

function setQuickBtnsDisabled(disabled){
  document.querySelectorAll('.quick-btn').forEach(function(b){b.disabled=disabled;});
}

/* ===== 处理用户输入 ===== */
function processInput(text){
  if(isSearching) return;
  isSearching=true;
  setQuickBtnsDisabled(true);
  showUserMessage(text);
  showLoadingHint('正在为您匹配套餐');

  var t=text.toLowerCase();
  var matched=false;

  if(/电信/.test(t)){userConditions.operator='电信';matched=true;}
  else if(/移动/.test(t)){userConditions.operator='移动';matched=true;}
  else if(/联通/.test(t)){userConditions.operator='联通';matched=true;}
  else if(/广电/.test(t)){userConditions.operator='广电';matched=true;}

  if(/便宜|低月租|省钱|学生|预算|20以内|30以内|便宜/.test(t)){userConditions.budget=true;matched=true;}
  if(/通话|打电话|分钟/.test(t)){userConditions.needTalk=true;matched=true;}
  if(/纯流量|不要通话|不需要通话/.test(t)){userConditions.needTalk=false;matched=true;}
  if(/全国|不限地区|全国通用/.test(t)){userConditions.region='nation';matched=true;}

  if(!matched){
    hideLoadingHint();
    showBotMessage('我理解您的需求，为您推荐以下套餐：');
    isSearching=false;
    setQuickBtnsDisabled(false);
    doSearch();
    return;
  }

  updateConditionsBar();
  var reply='好的！';
  if(userConditions.operator) reply+='为您筛选'+userConditions.operator+'套餐';
  if(userConditions.budget) reply+='，低月租优先';
  if(userConditions.needTalk===true) reply+='，含通话分钟';
  if(userConditions.region==='nation') reply+='，全国通用';
  reply+='，正在匹配...';
  setTimeout(function(){
    hideLoadingHint();
    showBotMessage(reply);
    doSearch();
  },400);
}

/* ===== 初始化 ===== */
function init(){
  showBotMessage('👋 您好！我是流量卡智能顾问\n\n请告诉我您的需求，比如：\n• "学生党，预算20以内"\n• "通话多，流量也要大"\n• "只要移动卡"');
  setTimeout(function(){
    showBotMessage('🌐 以下是当前热门套餐，全国套餐优先展示，点击「立即办理」直接下单：');
    var nation=PRODUCTS.filter(function(p){return p.nation&&p.price>0&&p.flow>0;}).sort(function(a,b){return b.flow-a.flow;});
    var local=PRODUCTS.filter(function(p){return !p.nation&&p.price>0&&p.flow>0;}).sort(function(a,b){return b.flow-a.flow;});
    currentResults=nation.concat(local);
    resultIndex=0;
    setTimeout(showNextResults,300);
  },600);
}

/* ===== 事件绑定 ===== */
document.getElementById('sendBtn').onclick=function(){
  var v=document.getElementById('userInput').value.trim();
  if(v){processInput(v);document.getElementById('userInput').value='';}
};
document.getElementById('userInput').addEventListener('keydown',function(e){
  if(e.key==='Enter'){
    var v=this.value.trim();
    if(v){processInput(v);this.value='';}
  }
});

// 快捷筛选按钮
document.getElementById('quickBtns').addEventListener('click',function(e){
  var btn=e.target.closest('.quick-btn');
  if(!btn||btn.disabled) return;
  var action=btn.dataset.action;
  var filter=btn.dataset.filter;
  if(action==='refresh'){
    if(isSearching) return;
    isSearching=true;
    setQuickBtnsDisabled(true);
    showLoadingHint('正在为您匹配套餐');
    setTimeout(function(){
      if(resultIndex>=currentResults.length) resultIndex=0;
      showNextResults();
    },500);
    return;
  }
  if(filter==='dx'){processInput('电信');return;}
  if(filter==='yd'){processInput('移动');return;}
  if(filter==='lt'){processInput('联通');return;}
  if(filter==='budget'){processInput('便宜');return;}
  if(filter==='nation'){processInput('全国');return;}
});

// 快捷提问按钮
document.getElementById('suggestBtns').addEventListener('click',function(e){
  var btn=e.target.closest('.suggest-btn');
  if(!btn) return;
  processInput(btn.dataset.q);
});

// 手机键盘适配
if(/iPhone|iPad|Android/i.test(navigator.userAgent)){
  var origH=window.innerHeight;
  document.getElementById('userInput').addEventListener('focus',function(){
    setTimeout(scrollToBottom,300);
  });
  window.addEventListener('resize',function(){
    if(window.innerHeight<origH-100) setTimeout(scrollToBottom,100);
  });
}

init();
</script>
