  {id:"p3822",operator:"联通",name:"0327联通绘梦卡【本地归属】",price:39.0,flow:20,talk:100,region:"发全国",nation:true,budget:false,desc:"39元20G通用+30G定向+100分钟",url:"https://vip.777haoka.cn/order/index?uid=V1pnM1FJS3VZZ3c9&pid=3822",tags:[]},
  {id:"p3827",operator:"广电",name:"0329广电花菜卡【本地归属】",price:39.0,flow:222,talk:15,region:"发全国",nation:true,budget:false,desc:"39元222G通用+0.15分钟（需参加多用多送活动）",url:"https://vip.777haoka.cn/order/index?uid=V1pnM1FJS3VZZ3c9&pid=3827",tags:[]}
];

var userConditions={budget:null,operator:null,needTalk:null,region:null,device:null};
var currentResults=[];
var resultIndex=0;

function init(){
  showBotMessage('👋 您好！我是流量卡智能顾问\n\n请告诉我您的需求，比如：\n• "学生党，预算20以内"\n• "通话多，流量也要大"\n• "只要移动卡"');
}

function showLoading(){document.getElementById('loading').classList.add('show');}
function hideLoading(){document.getElementById('loading').classList.remove('show');}

function addChatBubble(content,type){
  var now=new Date();
  var time=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  var div=document.createElement('div');
  div.className='chat-bubble '+type;
  var avatar=type==='bot'?'🤖':'🙋';
  div.innerHTML='<div class="chat-avatar">'+avatar+'</div><div class="chat-content">'+content.replace(/\n/g,'<br>')+'</div><div class="chat-time">'+time+'</div>';
  document.getElementById('chatArea').appendChild(div);
  scrollToBottom();
}

function showBotMessage(content){addChatBubble(content,'bot');}
function showUserMessage(content){addChatBubble(content,'user');}

function scrollToBottom(){
  var main=document.getElementById('main');
  setTimeout(function(){main.scrollTop=main.scrollHeight;},50);
}

function updateConditions(){
  var bar=document.getElementById('conditionsBar');
  var tags=[];
  if(userConditions.budget){
    var label=userConditions.budget.max?userConditions.budget.max+'元以内':'不限';
    tags.push('<span class="condition-tag" onclick="clearCondition(\'budget\')">预算:'+label+' <span class="remove">✕</span></span>');
  }
  if(userConditions.operator){
    tags.push('<span class="condition-tag" onclick="clearCondition(\'operator\')">'+userConditions.operator+' <span class="remove">✕</span></span>');
  }
  if(userConditions.needTalk===true){
    tags.push('<span class="condition-tag" onclick="clearCondition(\'needTalk\')">需要通话 <span class="remove">✕</span></span>');
  }
  if(userConditions.needTalk===false){
    tags.push('<span class="condition-tag" onclick="clearCondition(\'needTalk\')">纯流量 <span class="remove">✕</span></span>');
  }
  if(userConditions.region==='nation'){
    tags.push('<span class="condition-tag" onclick="clearCondition(\'region\')">全国可用 <span class="remove">✕</span></span>');
  }
  bar.innerHTML=tags.join('');
}

function clearCondition(key){
  delete userConditions[key];
  updateConditions();
  searchProducts();
}

function searchProducts(){
  var results=PRODUCTS.slice();
  if(userConditions.operator){
    results=results.filter(function(p){return p.operator===userConditions.operator;});
  }
  if(userConditions.budget&&userConditions.budget.max){
    results=results.filter(function(p){return p.price<=userConditions.budget.max;});
  }
  if(userConditions.needTalk===true){
    results=results.filter(function(p){return p.talk>0;});
  }else if(userConditions.needTalk===false){
    results=results.filter(function(p){return p.talk===0;});
  }
  if(userConditions.region==='nation'){
    results=results.filter(function(p){return p.nation;});
  }
  results.sort(function(a,b){
    if(a.hot&&!b.hot)return-1;
    if(!a.hot&&b.hot)return 1;
    return b.flow-a.flow;
  });
  currentResults=results;
  resultIndex=0;
  if(results.length===0){
    showBotMessage('😢 没有找到符合条件的套餐\n\n试试放宽条件？');
  }else{
    showBotMessage('✨ 找到 '+results.length+' 款合适的卡，正在为您展示...');
    setTimeout(function(){showNextResults();},500);
  }
}

function showNextResults(){
  hideLoading();
  var cards=document.createElement('div');
  cards.className='result-cards';
  var batch=currentResults.slice(resultIndex,resultIndex+3);
  batch.forEach(function(p){
    var hotTag=p.hot?'<span class="tag hot">🔥</span>':'';
    var regionTag=p.nation?'<span class="tag nation">🌐全国</span>':'<span class="tag local">📍省内</span>';
    var talkText=p.talk>0?p.talk+'分钟':'纯流量';
    cards.innerHTML+='<div class="result-card">'+
      '<div class="card-top">'+
        '<div class="card-name">'+p.name+'</div>'+
        '<div class="card-tags">'+hotTag+regionTag+'</div>'+
      '</div>'+
      '<div class="card-specs">'+
        '<div class="spec"><div class="spec-val">'+p.operator+'</div><div class="spec-label">运营商</div></div>'+
        '<div class="spec"><div class="spec-val">'+p.flow+'G</div><div class="spec-label">流量</div></div>'+
        '<div class="spec"><div class="spec-val">'+talkText+'</div><div class="spec-label">通话</div></div>'+
        '<div class="spec"><div class="spec-val">'+(p.region.split("发")[1]||'省内')+'</div><div class="spec-label">地区</div></div>'+
      '</div>'+
      '<div class="card-price">'+p.price+'<span>元/月</span></div>'+
      '<div class="card-desc" style="text-align:center;font-size:12px;color:#a0aec0;margin-bottom:10px">'+p.desc+'</div>'+
      '<div class="card-actions"><button class="card-btn order" onclick="window.open(\''+p.url+'\',\'_blank\')">📞 立即办理</button></div>'+
    '</div>';
  });
  document.getElementById('chatArea').appendChild(cards);
  resultIndex+=3;
  if(resultIndex<currentResults.length){
    var moreBtn=document.createElement('button');
    moreBtn.className='card-btn refresh';
    moreBtn.style.width='100%';
    moreBtn.style.marginTop='12px';
    moreBtn.textContent='🔄 查看更多 ('+currentResults.length+'-'+resultIndex+'/'+currentResults.length+')';
    moreBtn.onclick=showNextResults;
    document.getElementById('chatArea').appendChild(moreBtn);
  }
  scrollToBottom();
}

function showQR(){
  window.open('https://huangrunshi.github.io/flowcard-agent/qrcode.png','_blank');
}

function processInput(text){
  var t=text.toLowerCase();
  if(t.includes('改成')||t.includes('改')){
    if(t.includes('预算')||t.includes('20')||t.includes('30')||t.includes('40')||t.includes('便宜')){
      var match=t.match(/(\d+)/);
      if(match){
        userConditions.budget={max:parseInt(match[1])};
        updateConditions();
        showUserMessage('好的，预算改成'+match[1]+'元以内');
        showLoading();
        setTimeout(function(){searchProducts();},800);
        return;
      }
    }
    if(t.includes('不要')&&(t.includes('电信')||t.includes('移动')||t.includes('联通'))){
      var notOp=t.includes('电信')?'电信':t.includes('移动')?'移动':'联通';
      userConditions.operator=notOp==='电信'?'移动':'notOp==='移动'?'联通':'电信';
      updateConditions();
      showUserMessage('好的，不要'+notOp+'，给你推荐其他运营商');
      showLoading();
      setTimeout(function(){searchProducts();},800);
      return;
    }
  }
  if(t.includes('电信')||t.includes('dx')){
    userConditions.operator='电信';
    updateConditions();
    showUserMessage('好的，要电信卡');
    showLoading();
    setTimeout(function(){searchProducts();},800);
    return;
  }
  if(t.includes('移动')||t.includes('yd')){
    userConditions.operator='移动';
    updateConditions();
    showUserMessage('好的，要移动卡');
    showLoading();
    setTimeout(function(){searchProducts();},800);
    return;
  }
  if(t.includes('联通')||t.includes('lt')){
    userConditions.operator='联通';
    updateConditions();
    showUserMessage('好的，要联通卡');
    showLoading();
    setTimeout(function(){searchProducts();},800);
    return;
  }
  if(t.includes('不要')&&(t.includes('电信')||t.includes('移动')||t.includes('联通'))){
    var notOp=t.includes('电信')?'电信':t.includes('移动')?'移动':'联通';
    userConditions.operator=notOp==='电信'?'移动':notOp==='移动'?'联通':'电信';
    updateConditions();
    showUserMessage('好的，避开'+notOp);
    showLoading();
    setTimeout(function(){searchProducts();},800);
    return;
  }
  if(t.includes('通话')||t.includes('打电话')||t.includes('分钟')||t.includes('电话多')){
    userConditions.needTalk=true;
    updateConditions();
    showUserMessage('好的，需要通话功能');
    showLoading();
    setTimeout(function(){searchProducts();},800);
    return;
  }
  if(t.includes('纯流量')||t.includes('不打电话')||t.includes('不要通话')){
    userConditions.needTalk=false;
    updateConditions();
    showUserMessage('好的，纯流量套餐');
    showLoading();
    setTimeout(function(){searchProducts();},800);
    return;
  }
  var budgetMatch=t.match(/(\d{1,2})\s*元/);
  if(budgetMatch){
    userConditions.budget={max:parseInt(budgetMatch[1])};
    updateConditions();
    showUserMessage('好的，预算'+budgetMatch[1]+'元以内');
    showLoading();
    setTimeout(function(){searchProducts();},800);
    return;
  }
  if(t.includes('便宜')||t.includes('低价')||t.includes('省钱')){
    userConditions.budget={max:30};
    updateConditions();
    showUserMessage('好的，帮你找低价套餐');
    showLoading();
    setTimeout(function(){searchProducts();},800);
    return;
  }
  if(t.includes('全国')||t.includes('通用')){
    userConditions.region='nation';
    updateConditions();
    showUserMessage('好的，要全国可用的');
    showLoading();
    setTimeout(function(){searchProducts();},800);
    return;
  }
  if(t.includes('学生')||t.includes('上学')){
    userConditions.budget={max:30};
    userConditions.needTalk=null;
    updateConditions();
    showUserMessage('好的，学生党套餐推荐');
    showLoading();
    setTimeout(function(){searchProducts();},800);
    return;
  }
  if(t.includes('推荐')||t.includes('热门')||t.includes('最好')){
    showUserMessage('好的，为你推荐热门套餐');
    showLoading();
    setTimeout(function(){searchProducts();},800);
    return;
  }
  if(t.includes('大流量')||t.includes('流量多')){
    showUserMessage('好的，找大流量套餐');
    showLoading();
    setTimeout(function(){
      currentResults=PRODUCTS.slice().sort(function(a,b){return b.flow-a.flow;});
      resultIndex=0;
      showBotMessage('📊 按流量排序的大流量套餐：');
      setTimeout(function(){showNextResults();},500);
    },800);
    return;
  }
  showBotMessage('收到！我来帮你找...\n\n您还有什么要求吗？\n• 预算多少？（比如30元以内）\n• 需要通话吗？\n• 要哪个运营商？');
  showLoading();
  setTimeout(function(){searchProducts();},800);
}

document.getElementById('sendBtn').onclick=function(){
  var input=document.getElementById('userInput');
  var text=input.value.trim();
  if(!text)return;
  input.value='';
  showUserMessage(text);
  processInput(text);
};

document.getElementById('userInput').onkeydown=function(e){
  if(e.key==='Enter')document.getElementById('sendBtn').click();
};

document.querySelectorAll('.quick-btn').forEach(function(btn){
  btn.onclick=function(){
    var action=this.dataset.action;
    var filter=this.dataset.filter;
    if(action==='refresh'){
      showUserMessage('换一批');
      showLoading();
      setTimeout(function(){
        var shuffled=currentResults.slice().sort(function(){return 0.5-Math.random();});
        currentResults=shuffled;
        resultIndex=0;
        showNextResults();
      },500);
      return;
    }
    if(filter==='dx'){processInput('电信');return;}
    if(filter==='yd'){processInput('移动');return;}
    if(filter==='lt'){processInput('联通');return;}
    if(filter==='budget'){processInput('便宜');return;}
    if(filter==='nation'){processInput('全国');return;}
  };
});

init();
</script>
